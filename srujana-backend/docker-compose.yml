# Local dev Postgres — one service, Prisma-friendly, data survives restarts.
#
# Bring up:  docker compose up -d
# Bring down: docker compose down            (keeps volume)
# Wipe data:  docker compose down -v         (destroys volume)
#
# Host port 5433 avoids clashing with any native Postgres on 5432. Container
# still listens on the default 5432 internally so nothing in the postgres
# image needs custom config.

services:
  postgres:
    image: postgres:16-alpine
    container_name: accurith-pg
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: accurith
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d accurith']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
