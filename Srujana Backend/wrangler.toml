name = "accurith-web"

# Cloudflare Pages: this is the directory `next build` produces under
# `output: 'export'`. Wrangler serves it alongside /functions/.
pages_build_output_dir = "./out"

# 2024-09-23 is the compat date where `nodejs_compat_v2` became the default
# behavior of `nodejs_compat`. worker-mailer uses cloudflare:sockets (a native
# Workers API — no Node polyfill needed), but it imports a couple of Node
# built-ins (buffer, crypto) that `nodejs_compat` provides.
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret variables can live here (they get committed). Secrets — SMTP_PASS
# specifically — MUST live in .dev.vars (local) or the Cloudflare dashboard
# (production), never in this file.
# [vars]
# NEXT_PUBLIC_SITE_URL = "https://accurith.com"
